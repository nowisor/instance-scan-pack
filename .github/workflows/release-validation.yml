name: Release validation

on:
  push:
    branches: [main, 'release/*']
  pull_request:

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate manifest.json structure
        run: |
          jq -e '.pack_name and .pack_version and .finding_schema_version and (.checks | length > 0)' \
            nowisor/instance-scan-pack/manifest.json > /dev/null
          echo "Manifest structure OK"

      - name: Verify every src/fluent/scan-checks file has a manifest entry
        run: |
          MISSING=0
          for FILE in nowisor/instance-scan-pack/src/fluent/scan-checks/*.now.ts; do
            [ -e "$FILE" ] || continue
            BASE=$(basename "$FILE" .now.ts)
            CHECK_ID="nowisor-${BASE}"
            if ! jq -e --arg id "$CHECK_ID" '.checks[] | select(.id == $id)' \
                nowisor/instance-scan-pack/manifest.json > /dev/null; then
              echo "  Missing manifest entry: $CHECK_ID (file: $FILE)"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING check file(s) without manifest entry"
            exit 1
          fi
          echo "All scan-check files have manifest entries"

      - name: Verify every manifest entry has a source file
        run: |
          MISSING=0
          jq -r '.checks[].id' nowisor/instance-scan-pack/manifest.json | while read CHECK_ID; do
            BASE="${CHECK_ID#nowisor-}"
            FILE="nowisor/instance-scan-pack/src/fluent/scan-checks/${BASE}.now.ts"
            if [ ! -e "$FILE" ]; then
              echo "  Manifest entry without source file: $CHECK_ID (expected: $FILE)"
              MISSING=$((MISSING+1))
            fi
          done
          # Note: cannot reliably propagate $MISSING out of the subshell pipeline above.
          # Run a second pass that fails the step if any are missing.
          jq -r '.checks[].id' nowisor/instance-scan-pack/manifest.json | while read CHECK_ID; do
            BASE="${CHECK_ID#nowisor-}"
            FILE="nowisor/instance-scan-pack/src/fluent/scan-checks/${BASE}.now.ts"
            [ -e "$FILE" ] || exit 1
          done
          echo "All manifest entries have source files"

      - name: Verify every manifest entry has a KB page on nowisor.com
        env:
          KB_VALIDATION_ENABLED: ${{ vars.KB_VALIDATION_ENABLED || 'false' }}
        run: |
          if [ "$KB_VALIDATION_ENABLED" != "true" ]; then
            echo "KB URL validation disabled (set vars.KB_VALIDATION_ENABLED=true to enable)"
            echo "Listing URLs that would be checked:"
            jq -r '.checks[].kb_url' nowisor/instance-scan-pack/manifest.json
            exit 0
          fi
          FAILED=0
          for URL in $(jq -r '.checks[].kb_url' nowisor/instance-scan-pack/manifest.json); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" != "200" ]; then
              echo "  KB page missing: $URL (status: $STATUS)"
              FAILED=$((FAILED+1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED KB page(s) not reachable"
            exit 1
          fi
          echo "All KB pages reachable"

      - name: Validate finding schema JSON in check scripts (smoke)
        run: |
          MISSING_META=0
          for FILE in nowisor/instance-scan-pack/scripts/check-*.js; do
            [ -e "$FILE" ] || continue
            if ! grep -q 'NOWISOR_METADATA' "$FILE"; then
              echo "  No NOWISOR_METADATA separator in: $FILE"
              MISSING_META=$((MISSING_META+1))
            fi
            if ! grep -q 'nowisor_finding_schema' "$FILE"; then
              echo "  No nowisor_finding_schema field in: $FILE"
              MISSING_META=$((MISSING_META+1))
            fi
          done
          if [ "$MISSING_META" -gt 0 ]; then
            echo "ERROR: $MISSING_META check script(s) missing v1 metadata emission"
            exit 1
          fi
          echo "All check scripts emit v1 metadata"

  build:
    runs-on: ubuntu-latest
    needs: validate-manifest
    defaults:
      run:
        working-directory: nowisor/instance-scan-pack
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx now-sdk build
